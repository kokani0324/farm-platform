<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>體驗活動｜小農工作台</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="farmer" data-active-side="farm-trips">
  <div id="headerHost"></div>
  <main class="dashboard-layout">
    <div id="sidebarHost"></div>
    <section class="dashboard-main">
      <div class="dashboard-hero">
        <div>
          <span class="eyebrow">my farm trips</span>
          <h2>我的體驗活動</h2>
          <p>建立活動後送平台審核，通過後可在「管理場次」新增報名場次。</p>
        </div>
        <a class="primary-button" href="farmer-farm-trip-form.html">+ 新增活動</a>
      </div>

      <article class="panel-card is-large" style="grid-column:1/-1">
        <table class="data-table">
          <thead><tr><th>活動</th><th>類別</th><th>計價</th><th>單價</th><th>容量/場</th><th>狀態</th><th>操作</th></tr></thead>
          <tbody id="rows"><tr><td colspan="7" style="text-align:center;color:var(--muted)">載入中…</td></tr></tbody>
        </table>
      </article>
    </section>
  </main>

  <div class="toast-flash" id="toast"></div>
  <script src="js/auth.js"></script>
  <script src="js/farmer-shell.js"></script>
  <script>
  (async function () {
    const esc = FarmerShell.escapeHtml;
    const currency = (v) => `NT$ ${Number(v).toLocaleString("zh-TW")}`;
    const TYPE = { FARM_EXPERIENCE: "農場體驗", FIELD_VISIT: "產地參訪" };
    const PRICING = { PER_PERSON: "每人", PER_WEIGHT: "每公斤" };
    const STATUS = { PENDING: "審核中", REJECTED: "未通過", ACTIVE: "上架中", CLOSED: "已下架" };
    const rows = document.getElementById("rows");
    await reload();
    document.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-close]");
      if (!btn) return;
      if (!confirm("確定要下架這個活動嗎？相關 ACTIVE 場次將自動取消。")) return;
      try { await NongAuth.request(`/api/farmer/farm-trips/${btn.dataset.close}/close`, { method: "POST" }); toast("已下架"); await reload(); }
      catch (err) { toast(err.message || "失敗", true); }
    });

    async function reload() {
      try {
        const page = await NongAuth.request("/api/farmer/farm-trips?size=30");
        const list = page.content || [];
        if (!list.length) { rows.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted)">還沒有活動。<a href="farmer-farm-trip-form.html" style="color:var(--leaf);margin-left:8px">+ 新增第一個</a></td></tr>`; return; }
        rows.innerHTML = list.map((t) => `
          <tr>
            <td><strong>${esc(t.title)}</strong><div style="color:var(--muted);font-size:12px">${esc(t.location || "")}</div></td>
            <td>${esc(TYPE[t.tripType] || t.tripType)}</td>
            <td>${esc(PRICING[t.pricingMode] || "")}</td>
            <td>${currency(t.price)}</td>
            <td>${t.pricingMode === "PER_WEIGHT" ? "無上限" : (t.capacityPerSession ?? "—")}</td>
            <td><span class="status ${t.status === "ACTIVE" ? "" : (t.status === "REJECTED" ? "warning" : "muted")}">${esc(STATUS[t.status] || t.status)}</span></td>
            <td>
              <a class="user-btn ghost" href="farmer-farm-trip-form.html?id=${t.id}">編輯</a>
              ${t.status === "ACTIVE" ? `<a class="user-btn ghost" href="farmer-farm-trip-sessions.html?id=${t.id}">管理場次</a>` : ""}
              <a class="user-btn ghost" href="farm-trip-detail.html?id=${t.id}">預覽</a>
              ${t.status === "ACTIVE" ? `<button class="user-btn ghost" data-close="${t.id}" style="color:var(--clay)">下架</button>` : ""}
            </td>
          </tr>
        `).join("");
      } catch (e) { rows.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--clay)">載入失敗：${esc(e.message)}</td></tr>`; }
    }
    function toast(msg, isError) {
      const t = document.getElementById("toast"); if (!t) return;
      t.textContent = msg; t.classList.toggle("is-error", !!isError); t.classList.add("is-visible");
      clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("is-visible"), 1800);
    }
  })();
  </script>
</body>
</html>
