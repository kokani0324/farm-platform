<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的部落格｜小農工作台</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>
<body data-page="farmer" data-active-side="blogs">
  <div id="headerHost"></div>
  <main class="dashboard-layout">
    <div id="sidebarHost"></div>
    <section class="dashboard-main">
      <div class="dashboard-hero">
        <div>
          <span class="eyebrow">my blogs</span>
          <h2>我的部落格文章</h2>
          <p>「產地日記」只有小農可以寫，是小農工作台限定的內容類別。</p>
        </div>
        <a class="primary-button" href="farmer-blog-form.html">+ 新增文章</a>
      </div>

      <article class="panel-card is-large" style="grid-column:1/-1">
        <table class="data-table">
          <thead><tr><th>標題</th><th>分類</th><th>狀態</th><th>瀏覽</th><th>讚</th><th>留言</th><th>操作</th></tr></thead>
          <tbody id="rows"><tr><td colspan="7" style="text-align:center;color:var(--muted)">載入中…</td></tr></tbody>
        </table>
      </article>
    </section>
  </main>

  <div class="toast-flash" id="toast"></div>
  <script src="js/auth.js"></script>
  <script src="js/farmer-shell.js"></script>
  <script>
  (async function () {
    const esc = FarmerShell.escapeHtml;
    const rows = document.getElementById("rows");
    await reload();

    document.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-del]");
      if (!btn) return;
      if (!confirm("確定要刪除這篇文章嗎？")) return;
      try { await NongAuth.request(`/api/blogs/${btn.dataset.del}`, { method: "DELETE" }); toast("已刪除"); await reload(); }
      catch (err) { toast(err.message || "失敗", true); }
    });

    async function reload() {
      try {
        const page = await NongAuth.request("/api/blogs/mine?size=30");
        const list = page.content || [];
        if (!list.length) { rows.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--muted)">還沒有文章。<a href="farmer-blog-form.html" style="color:var(--leaf);margin-left:8px">+ 寫第一篇</a></td></tr>`; return; }
        rows.innerHTML = list.map((b) => `
          <tr>
            <td><a href="blog-detail.html?id=${b.id}" target="_blank" style="color:var(--leaf);font-weight:600">${esc(b.title || "")}</a></td>
            <td>${esc(b.blogTypeName || "")}</td>
            <td><span class="status ${b.status === "PUBLISHED" ? "" : "warning"}">${esc(b.status)}</span></td>
            <td>${b.viewCount || 0}</td>
            <td>${b.likeCount || 0}</td>
            <td>${b.commentCount || 0}</td>
            <td>
              <a class="user-btn ghost" href="farmer-blog-form.html?id=${b.id}">編輯</a>
              <button class="user-btn ghost" data-del="${b.id}" style="color:var(--clay)">刪除</button>
            </td>
          </tr>
        `).join("");
      } catch (e) { rows.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--clay)">載入失敗：${esc(e.message)}</td></tr>`; }
    }
    function toast(msg, isError) {
      const t = document.getElementById("toast"); if (!t) return;
      t.textContent = msg; t.classList.toggle("is-error", !!isError); t.classList.add("is-visible");
      clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("is-visible"), 1800);
    }
  })();
  </script>
</body>
</html>
