<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>產地地圖｜你儂我農</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, "Noto Sans TC", sans-serif;
        }

        body {
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            overflow: hidden;
        }

        body[data-active-nav="farm-map"] .main-nav .dropdown {
            display: none;
        }

        .map-page {
            display: grid;
            grid-template-columns: 380px 1fr;
            min-height: 0;
            overflow: hidden;
        }

        .map-sidebar {
            padding: 24px 20px;
            overflow-y: auto;
            background:
                linear-gradient(90deg, rgba(255, 255, 255, .30) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255, 255, 255, .24) 1px, transparent 1px),
                var(--paper);
            background-size: 38px 38px;
            border-right: 1px solid var(--line);
            box-shadow: 8px 0 24px rgba(55, 45, 28, .08);
            z-index: 10;
        }

        .map-sidebar h1 {
            margin: 0 0 8px;
            font-size: 24px;
            color: var(--ink);

        }
        .map-sidebar p {
            margin: 0 0 22px;
            color: var(--muted);
        }

        .farm-list {
            display: grid;
            gap: 14px;
        }

        .farm-card {
            display: grid;
            grid-template-columns: 96px 1fr;
            gap: 12px;
            padding: 10px;
            border: 1px solid rgba(222, 208, 185, .72);
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255, 253, 247, .92);
            box-shadow: 0 10px 24px rgba(55, 45, 28, .07);
            transition: border-color .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
        }

        .farm-card:hover {
            border-color: rgba(49, 95, 58, .42);
            background: var(--white);
            box-shadow: 0 14px 28px rgba(55, 45, 28, .11);
            transform: translateY(-1px);
        }

        .farm-card h2 {
            margin: 0 0 6px;
            font-size: 16px;
        }

        .farm-card p {
            margin: 0;
            color: #333;
            font-size: 14px;
            line-height: 1.4;
        }

        .map-main {
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .farm-detail {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 340px;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,.2);
            z-index: 500;
        }

        .farm-detail.is-hidden {
            display: none;
        }

        .farm-detail img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .farm-detail-content {
            padding: 16px;
        }

        .farm-detail h2 {
            margin: 0 0 8px;
            font-size: 20px;
        }

        .farm-detail p {
            line-height: 1.7;
        }

        .detail-close {
            position: absolute;
            top: 10px;
            right: 10px;
            border: 0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            font-size: 22px;
        }

        .detail-button {
            display: block;
            margin-top: 14px;
            padding: 12px;
            text-align: center;
            color: white;
            background: #5b9b73;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
        }

        .farm-card img {
            width: 96px;
            height: 72px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .farm-card.is-active {
            border-color: var(--leaf);
            background: var(--leaf-light);
            box-shadow: 0 14px 30px rgba(49, 95, 58, .16);
        }


    </style>
  <link rel="icon" type="image/png" href="https://storage.googleapis.com/cka101-15/form/farmLogo.png?v=20260613-transparent">
</head>

        <span class="brand-seal">儂</span>
        <span><strong>你儂我農</strong><small>Farmily</small></span>
    </a>
    <button class="mobile-menu" id="mobileMenu" type="button" aria-label="開啟選單">☰</button>
    <nav class="main-nav" id="mainNav" aria-label="消費者主要功能">
        <div class="nav-item"><a href="news.html"       data-nav-key="news">最新消息</a></div>
        <div class="nav-item"><a href="producers.html"  data-nav-key="producers">農場</a></div>
        <div class="nav-item"><a href="products.html"   data-nav-key="products">全部商品</a></div>
        <div class="nav-item"><a href="group-buys.html" data-nav-key="group-buys">團購</a></div>
        <div class="nav-item"><a href="farm-trips.html" data-nav-key="farm-trips">體驗活動</a></div>
        <div class="nav-item"><a href="blogs.html"      data-nav-key="blogs">部落格</a></div>
        <div class="nav-item"><a href="farm-map.html"   data-nav-key="farm-map">產地地圖</a></div>
        <div class="user-zone" id="userZone"></div>
    </nav>
</header>
<div class="map-page">
    <aside class="map-sidebar">
    <h1>台灣小農地圖</h1>
    <p>探索台灣各地農地與當季商品</p>

        <div id="farmList" class="farm-list"></div>


    </aside>
    <main class="map-main">
        <div id="map"></div>

        <section id="farmDetail" class="farm-detail is-hidden"></section>
    </main>
</div>


<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
