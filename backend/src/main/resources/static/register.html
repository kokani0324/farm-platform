<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>會員註冊｜你儂我農</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="auth">
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="你儂我農首頁">
      <span class="brand-seal">儂</span>
      <span><strong>你儂我農</strong><small>from soil to table</small></span>
    </a>
    <nav class="utility-nav">
      <a href="index.html">回到首頁</a>
      <a href="login.html">已有帳號</a>
    </nav>
  </header>

  <main class="auth-wrapper">
    <section class="auth-card">
      <span class="eyebrow">member sign up</span>
      <h1>建立會員帳號</h1>
      <p class="auth-foot" style="text-align:left;margin:0 0 14px">會員可瀏覽商品、加入購物車、參加團購、預約體驗活動。<br>想成為小農請走「<a href="farmer-register.html">小農申請入口</a>」(需審核)。</p>

      <div class="auth-error" id="registerError"></div>

      <form id="registerForm" novalidate>
        <label class="field">
          <span>姓名</span>
          <input type="text" id="regName" maxlength="50" required>
        </label>
        <label class="field">
          <span>暱稱(選填)</span>
          <input type="text" id="regNickname" maxlength="50">
        </label>
        <label class="field">
          <span>Email</span>
          <input type="email" id="regEmail" maxlength="50" required autocomplete="email">
        </label>
        <label class="field">
          <span>密碼(6-64 字元)</span>
          <input type="password" id="regPassword" minlength="6" maxlength="64" required autocomplete="new-password">
        </label>
        <label class="field">
          <span>電話(選填)</span>
          <input type="tel" id="regPhone" maxlength="20" placeholder="09xx-xxx-xxx">
        </label>
        <label class="field">
          <span>地址(選填)</span>
          <input type="text" id="regAddress" maxlength="100">
        </label>
        <button class="primary-button" type="submit">建立帳號</button>
      </form>

      <p class="auth-foot">已經有帳號？<a href="login.html">登入</a></p>
    </section>
  </main>

  <script src="js/auth.js"></script>
  <script>
    (function initRegisterPage() {
      const errorBox = document.getElementById("registerError");
      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.add("is-visible");
      }

      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.remove("is-visible");
        const payload = {
          name: document.getElementById("regName").value.trim(),
          nickname: document.getElementById("regNickname").value.trim() || null,
          email: document.getElementById("regEmail").value.trim(),
          password: document.getElementById("regPassword").value,
          phone: document.getElementById("regPhone").value.trim() || null,
          address: document.getElementById("regAddress").value.trim() || null
        };
        if (!payload.name || !payload.email || !payload.password) {
          showError("姓名、Email、密碼皆為必填"); return;
        }
        try {
          const auth = await NongAuth.memberRegister(payload);
          NongAuth.saveSession(auth);
          NongAuth.redirectAfterLogin(auth);
        } catch (err) {
          showError(err.message || "註冊失敗");
        }
      });
    })();
  </script>
</body>
</html>
