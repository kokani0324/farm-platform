<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新增 / 編輯體驗活動｜小農工作台</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="farmer" data-active-side="farm-trips">
  <div id="headerHost"></div>
  <main class="dashboard-layout">
    <div id="sidebarHost"></div>
    <section class="dashboard-main">
      <div class="dashboard-hero">
        <div>
          <span class="eyebrow">trip form</span>
          <h2 id="formTitle">新增體驗活動</h2>
          <p>填寫活動內容、時間、地點與報名期間。</p>
        </div>
        <a class="user-btn ghost" href="farmer-farm-trips.html">← 回列表</a>
      </div>

      <article class="panel-card is-large" style="grid-column:1/-1">
        <form id="form">
          <div class="form-grid">
            <label class="field"><span>類別</span><select id="categoryId" required></select></label>
            <label class="field"><span>類型</span>
              <select id="tripType" required>
                <option value="FARM_EXPERIENCE">農場體驗營</option>
                <option value="FIELD_VISIT">產地參訪</option>
              </select>
            </label>
            <label class="field"><span>活動名稱（≤30 字）</span><input type="text" id="title" maxlength="30" required></label>
            <label class="field"><span>單價 / 人</span><input type="number" id="price" min="0" step="1" required></label>
            <label class="field"><span>名額</span><input type="number" id="capacity" min="1" required></label>
            <label class="field"><span>地點</span><input type="text" id="location" maxlength="100"></label>
            <label class="field"><span>活動開始</span><input type="datetime-local" id="tripStart" required></label>
            <label class="field"><span>活動結束</span><input type="datetime-local" id="tripEnd" required></label>
            <label class="field"><span>報名開放</span><input type="datetime-local" id="bookStart" required></label>
            <label class="field"><span>報名截止</span><input type="datetime-local" id="bookEnd" required></label>
            <label class="field" style="grid-column:1/-1"><span>圖片網址</span><input type="url" id="imageUrl" maxlength="500" placeholder="https://..."></label>
          </div>
          <label class="field"><span>活動介紹（≤500 字）</span><textarea id="intro" maxlength="500" style="min-height:100px"></textarea></label>
          <div class="action-row" style="justify-content:flex-end">
            <a class="user-btn ghost" href="farmer-farm-trips.html">取消</a>
            <button class="primary-button" type="submit" id="saveBtn">儲存</button>
          </div>
        </form>
      </article>
    </section>
  </main>

  <div class="toast-flash" id="toast"></div>
  <script src="js/auth.js"></script>
  <script src="js/farmer-shell.js"></script>
  <script>
  (async function () {
    const esc = FarmerShell.escapeHtml;
    const id = new URLSearchParams(location.search).get("id");
    const isEdit = !!id;
    document.getElementById("formTitle").textContent = isEdit ? "編輯體驗活動" : "新增體驗活動";

    // 載入活動類別
    try {
      const cats = await NongAuth.request("/api/farm-trips/categories");
      const sel = document.getElementById("categoryId");
      sel.innerHTML = `<option value="">請選擇類別</option>` + cats.map((c) => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
    } catch (e) { toast("類別載入失敗：" + e.message, true); }

    if (isEdit) {
      try {
        const t = await NongAuth.request(`/api/farm-trips/${id}`);
        document.getElementById("categoryId").value = t.categoryId || "";
        document.getElementById("tripType").value = t.tripType || "FARM_EXPERIENCE";
        document.getElementById("title").value = t.title || "";
        document.getElementById("price").value = t.price;
        document.getElementById("capacity").value = t.capacity;
        document.getElementById("location").value = t.location || "";
        document.getElementById("tripStart").value = trimSeconds(t.tripStart);
        document.getElementById("tripEnd").value = trimSeconds(t.tripEnd);
        document.getElementById("bookStart").value = trimSeconds(t.bookStart);
        document.getElementById("bookEnd").value = trimSeconds(t.bookEnd);
        document.getElementById("imageUrl").value = t.imageUrl || "";
        document.getElementById("intro").value = t.intro || "";
      } catch (e) { toast("活動載入失敗：" + e.message, true); }
    }

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = {
        categoryId: Number(document.getElementById("categoryId").value) || null,
        tripType: document.getElementById("tripType").value,
        title: document.getElementById("title").value.trim(),
        intro: document.getElementById("intro").value.trim() || null,
        imageUrl: document.getElementById("imageUrl").value.trim() || null,
        location: document.getElementById("location").value.trim() || null,
        price: Number(document.getElementById("price").value),
        capacity: Number(document.getElementById("capacity").value),
        tripStart: document.getElementById("tripStart").value,
        tripEnd: document.getElementById("tripEnd").value,
        bookStart: document.getElementById("bookStart").value,
        bookEnd: document.getElementById("bookEnd").value
      };
      const btn = document.getElementById("saveBtn");
      btn.disabled = true; btn.textContent = "儲存中…";
      try {
        const url = isEdit ? `/api/farmer/farm-trips/${id}` : "/api/farmer/farm-trips";
        const method = isEdit ? "PUT" : "POST";
        await NongAuth.request(url, { method, body: JSON.stringify(payload) });
        toast("已儲存");
        setTimeout(() => location.href = "farmer-farm-trips.html", 600);
      } catch (err) { toast(err.message || "儲存失敗", true); btn.disabled = false; btn.textContent = "儲存"; }
    });

    function trimSeconds(iso) { if (!iso) return ""; return String(iso).slice(0, 16); }
    function toast(msg, isError) {
      const t = document.getElementById("toast"); if (!t) return;
      t.textContent = msg; t.classList.toggle("is-error", !!isError); t.classList.add("is-visible");
      clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove("is-visible"), 1800);
    }
  })();
  </script>
</body>
</html>
